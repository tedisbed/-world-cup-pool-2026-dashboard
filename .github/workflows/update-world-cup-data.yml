name: Update World Cup Data

on:
  schedule:
    - cron: "*/7 * * * *"
    - cron: "5 0 * * *"
  workflow_dispatch:
    inputs:
      refresh_schedule:
        description: "Refresh cached kickoff times even if no match is live"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: world-cup-data-feed
  cancel-in-progress: false

jobs:
  update-live-state:
    runs-on: ubuntu-latest
    steps:
      - name: Check tournament window
        id: window
        shell: bash
        run: |
          today="$(date -u +%Y-%m-%d)"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || ( "$today" > "2026-06-10" && "$today" < "2026-07-20" ) ]]; then
            echo "run_import=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_import=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.window.outputs.run_import == 'true'
        uses: actions/checkout@v4

      - name: Set up Node
        if: steps.window.outputs.run_import == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch API-Football data
        id: fetch
        if: steps.window.outputs.run_import == 'true'
        continue-on-error: true
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        shell: bash
        run: |
          if [[ "${{ github.event.schedule }}" == "5 0 * * *" || "${{ inputs.refresh_schedule }}" == "true" ]]; then
            node scripts/fetch-api-football.mjs --refresh-schedule
          else
            node scripts/fetch-api-football.mjs
          fi

      - name: Commit live state changes
        if: steps.window.outputs.run_import == 'true'
        shell: bash
        run: |
          if git diff --quiet -- data/live-state.json data/api-fixture-times.json data/api-request-budget.json; then
            echo "No live state changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/live-state.json data/api-fixture-times.json data/api-request-budget.json
            git commit -m "Update World Cup live data"
            git push
          fi

          if [[ "${{ steps.fetch.outcome }}" == "failure" ]]; then
            echo "API-Football fetch failed after reserving budget."
            exit 1
          fi
